<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LatteX — scripts</title>
  <style>
    :root { color-scheme: light; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; min-height: 100vh;
           display: grid; place-items: center; background: #f4f6f6; color: #1a1f21; }
    main { text-align: center; padding: 3rem 1.5rem; }
    .eyebrow { font-family: ui-monospace, monospace; font-size: .72rem; letter-spacing: .18em;
               text-transform: uppercase; color: #1f7d72; margin: 0 0 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem; max-width: 900px; }
    .card { display: inline-flex; flex-direction: column; align-items: center; gap: 1.25rem;
            background: #fff; border: 1px solid #e3e8e7; border-radius: 14px;
            padding: 2rem 2.5rem; box-shadow: 0 6px 24px rgba(0,0,0,.06); }
    .src { font-family: ui-monospace, monospace; font-size: .9rem; color: #3a4749;
           background: #eef2f1; border: 1px solid #e0e6e4; border-radius: 7px; padding: .4rem .8rem; }
    .render svg { height: 120px; width: auto; display: block; }
    figcaption { font-family: ui-monospace, monospace; font-size: .62rem; letter-spacing: .08em;
                 text-transform: uppercase; color: #8a9896; max-width: 22ch; }
  </style>
</head>

  <main>
    <p class="eyebrow">LatteX &middot; S4 layout</p>

          <div class="render">

                <path d="M464 160 L432 0 L38 0 L38 34 L190 186 Q240 237 273 278 Q306 320 322 362 Q339 404 339 456 Q339 512 305 545 Q272 579 214 579 Q165 579 130 558 Q96 537 68 481 L44 491 Q67 564 117 604 Q167 644 240 644 Q297 644 340 622 Q383 601 407 562 Q432 524 432 471 Q432 427 413 386 Q395 346 358 303 Q322 260 269 206 L137 81 L137 76 L207 79 L346 79 Q386 79 402 97 Q418 115 435 160 L464 160 Z" transform="translate(19.16 -15.2) scale(0.028 -0.028)"/>
                <path d="M257 28 L257 0 L32 0 L32 28 Q66 28 80 34 Q95 41 98 57 Q102 73 102 101 L102 380 Q102 412 91 419 Q80 427 58 427 Q48 427 40 426 Q33 425 33 425 L33 454 L159 482 L185 482 L185 101 Q185 72 189 56 Q193 40 208 34 Q224 28 257 28 Z M145 673 Q171 673 186 656 Q202 640 202 617 Q202 594 186 577 Q171 560 145 560 Q120 560 104 577 Q88 594 88 617 Q88 640 103 656 Q119 673 145 673 Z" transform="translate(19.16 9.644) scale(0.028 -0.028)"/>
              </g>
            </svg>
          </div>
          <figcaption>simultaneous subscript and superscript</figcaption>
        </figure>
  </main>
</body>
</html>
